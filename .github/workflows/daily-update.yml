name: Daily Strava Update

# ADR-004: cron 11h Brasília (14h UTC) — depois do treino da manhã.
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: # atualização manual fora do cron

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  # 1) ETL: busca incremental + normalização + commit dos JSONs na main
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Fetch Strava data (with one retry after 30 min)
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python etl/strava_fetch.py || { echo "Strava fetch failed, retrying in 30 min..."; sleep 1800; python etl/strava_fetch.py; }

      - name: Normalize and calculate KPIs
        run: python etl/normalize.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update activities $(date -u +%Y-%m-%d)"
          git push

  # 2) Deploy: só roda se o ETL passou. Build Vite + publica no GitHub Pages.
  deploy:
    needs: etl
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # pega os JSONs recém-commitados

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install & build
        working-directory: site
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - id: deployment
        uses: actions/deploy-pages@v4
