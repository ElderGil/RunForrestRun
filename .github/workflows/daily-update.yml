name: Daily Strava Update

# ADR-004: cron 11h Brasília (14h UTC) — depois do treino da manhã.
# Faz só o ETL e commita os JSONs na main; o push dispara o deploy (pages.yml),
# mantendo dados e site em sincronia sem acoplar o deploy aos Secrets do Strava.
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Fetch Strava data (with one retry after 30 min)
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python etl/strava_fetch.py || { echo "Strava fetch failed, retrying in 30 min..."; sleep 1800; python etl/strava_fetch.py; }

      - name: Normalize and calculate KPIs
        run: python etl/normalize.py

      - name: Commit updated data (triggers pages.yml deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update activities $(date -u +%Y-%m-%d)"
          git push
